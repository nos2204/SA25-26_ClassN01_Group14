{% extends 'base.html' %}
{% block title %}{% if action == 'add' %}Thêm{% else %}Sửa{% endif %} Sinh viên — QLSV{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header fw-semibold">
                <i class="bi bi-person-{% if action == 'add' %}plus{% else %}lines-fill{% endif %} me-2"></i>
                {% if action == 'add' %}Thêm hồ sơ sinh viên mới{% else %}Sửa thông tin sinh viên{% endif %}
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Mã sinh viên (MSSV) <span class="text-danger">*</span></label>
                            <input type="text" name="student_code" class="form-control" required
                                   value="{{ student.student_code if student else '' }}"
                                   placeholder="VD: SV001">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Họ và Tên <span class="text-danger">*</span></label>
                            <input type="text" name="full_name" class="form-control" required
                                   value="{{ student.full_name if student else '' }}"
                                   placeholder="VD: Nguyễn Văn A">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Giới tính</label>
                            <select name="gender" class="form-select">
                                <option value="Nam"  {% if not student or student.gender == 'Nam' %}selected{% endif %}>Nam</option>
                                <option value="Nữ"   {% if student and student.gender == 'Nữ' %}selected{% endif %}>Nữ</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Ngày sinh</label>
                            <input type="date" name="date_of_birth" class="form-control"
                                   value="{{ student.date_of_birth.strftime('%Y-%m-%d') if student and student.date_of_birth else '' }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Lớp</label>
                            <input type="text" name="class_name" class="form-control"
                                   value="{{ student.class_name if student else '' }}"
                                   placeholder="VD: CNTT01">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control"
                                   value="{{ student.email if student else '' }}"
                                   placeholder="example@email.com">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Số điện thoại</label>
                            <input type="tel" name="phone" class="form-control"
                                   value="{{ student.phone if student else '' }}"
                                   placeholder="0901234567">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Khoa / Ngành</label>
                            <select name="department_id" class="form-select">
                                <option value="">— Chưa xác định —</option>
                                {% for dept in departments %}
                                <option value="{{ dept.id }}"
                                    {% if student and student.department_id == dept.id %}selected{% endif %}>
                                    {{ dept.department_name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Địa chỉ</label>
                            <input type="text" name="address" class="form-control"
                                   value="{{ student.address if student else '' }}"
                                   placeholder="Địa chỉ liên hệ">
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-1"></i>Lưu
                        </button>
                        <a href="{{ url_for('students_manager') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-1"></i>Quay lại
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
