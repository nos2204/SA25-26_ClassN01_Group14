<!DOCTYPE html>
<html lang="vi" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập — QLSV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root, [data-bs-theme="light"] {
            --bg-body: #f4f6f9;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-sub: #475569;
            --border-input: #cbd5e1;
        }

        [data-bs-theme="dark"] {
            --bg-body: #0f111a;
            --bg-card: #161925;
            --text-main: #ffffff;
            --text-sub: #cbd5e1;
            --border-input: #334155;
        }

        body { 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            background-color: var(--bg-body) !important;
            color: var(--text-main) !important;
            transition: background-color 0.3s ease, color 0.3s ease; 
        }
        
        .login-card { 
            background-color: var(--bg-card) !important;
            border: 1px solid var(--border-input) !important;
            border-radius: 16px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.1) !important; 
            transition: all 0.3s ease; 
        }

        .text-muted { color: var(--text-sub) !important; }
        .form-label { color: var(--text-main) !important; }

        .form-control, .input-group-text {
            background-color: var(--bg-card) !important;
            color: var(--text-main) !important;
            border-color: var(--border-input) !important;
        }
        .form-control:focus {
            background-color: var(--bg-card) !important;
            color: var(--text-main) !important;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }

        .theme-toggle-btn { 
            position: absolute; top: 20px; right: 20px; border-radius: 50%; 
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; 
            z-index: 1000;
        }
    </style>
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>
</head>
<body>

<button class="btn btn-outline-secondary theme-toggle-btn" id="themeToggle" title="Đổi chế độ Sáng/Tối">
    <i class="bi bi-moon-fill" id="themeIcon"></i>
</button>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-sm-8">

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, msg in messages %}
                    <div class="alert alert-{{ category if category != 'error' else 'danger' }} alert-dismissible fade show mb-3" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        {{ msg }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <div class="card login-card p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-mortarboard-fill text-primary" style="font-size: 3rem;"></i>
                    <h4 class="fw-bold mt-2">Hệ thống QLSV</h4>
                    <p class="text-muted small">Vui lòng đăng nhập để tiếp tục</p>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Tên đăng nhập</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control" placeholder="Nhập tên đăng nhập" required autofocus>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Mật khẩu</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" id="pwdInput" class="form-control" placeholder="Nhập mật khẩu" required>
                            <button type="button" class="btn btn-outline-secondary" onclick="togglePwd()">
                                <i class="bi bi-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePwd() {
    const inp  = document.getElementById('pwdInput');
    const icon = document.getElementById('eyeIcon');
    if (inp.type === 'password') {
        inp.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        inp.type = 'password';
        icon.className = 'bi bi-eye';
    }
}

const themeToggle = document.getElementById('themeToggle');
const themeIcon = document.getElementById('themeIcon');
const htmlEl = document.documentElement;

updateThemeIcon(htmlEl.getAttribute('data-bs-theme'));

themeToggle.addEventListener('click', () => {
    const currentTheme = htmlEl.getAttribute('data-bs-theme');
    const newTheme = currentTheme === 'light' ? 'dark' : 'light';
    
    htmlEl.setAttribute('data-bs-theme', newTheme);
    localStorage.setItem('theme', newTheme);
    updateThemeIcon(newTheme);
});

function updateThemeIcon(theme) {
    if (theme === 'dark') {
        themeIcon.className = 'bi bi-sun-fill';
        themeToggle.className = 'btn btn-outline-warning theme-toggle-btn';
    } else {
        themeIcon.className = 'bi bi-moon-fill';
        themeToggle.className = 'btn btn-outline-secondary theme-toggle-btn';
    }
}
</script>
</body>
</html>
